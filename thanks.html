<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Received | Berg Bat</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0a0a0a;
      color: #cccccc;
      font-family: 'Assistant', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background-color: #000;
      padding: 24px 0;
      text-align: center;
      border-bottom: 3px solid #9B1B30;
    }
    .header-logo {
      width: 180px; margin: 0 auto; display: block;
    }
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }
    .check-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background-color: #9B1B30; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; font-size: 40px; color: #FFFFFF;
    }
    h1 {
      font-family: 'Oswald', Arial, sans-serif; font-size: 36px; font-weight: 700;
      color: #FFFFFF; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px;
    }
    p {
      font-size: 17px; color: #999; max-width: 420px; margin: 0 auto 24px; line-height: 1.6;
    }
    .back-link {
      display: inline-block; padding: 14px 36px;
      font-family: 'Oswald', Arial, sans-serif; font-size: 15px; font-weight: 600;
      color: #FFFFFF; text-decoration: none; text-transform: uppercase; letter-spacing: 1.5px;
      border: 2px solid #333; border-radius: 4px;
      transition: border-color 0.2s;
    }
    .back-link:hover { border-color: #9B1B30; }
    .footer {
      background-color: #000; padding: 24px 20px; text-align: center; border-top: 1px solid #1a1a1a;
    }
    .footer p { font-size: 12px; color: #555; margin-bottom: 4px; max-width: none; }
    .footer .tagline {
      font-family: 'Oswald', Arial, sans-serif; font-size: 12px; color: #C9A84C;
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px;
    }
    .footer-logo {
      width: 100px; margin: 0 auto 12px; display: block;
    }
    .footer a { color: #777; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.svg" alt="Berg Bat Company" class="header-logo">
  </div>
  <div class="content">
    <div>
      <div class="check-icon">&#10003;</div>
      <h1>We Got It</h1>
      <p>Your trophy bat order request is in. We'll be in touch within 24 hours to dial in the details.</p>
      <a href="https://bergbat.com" class="back-link">Back to BergBat.com</a>
    </div>
  </div>
  <div class="footer">
    <img src="logo.svg" alt="Berg Bat Company" class="footer-logo">
    <p style="font-size:12px; color:#666; margin-bottom:8px;">Handcrafted in Colorado Springs since 2010</p>
    <p><a href="https://bergbat.com">BergBat.com</a></p>
  </div>
</body>
</html>
